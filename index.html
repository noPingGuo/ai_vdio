<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Claudio — AI Radio</title>
<link rel="preconnect" href="https://api.fish.audio">
<link rel="preconnect" href="https://api.deepseek.com">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
}

/* 卡片 */
.card {
    width: 380px;
    max-height: 92vh;
    border-radius: 20px;
    overflow: hidden;
    background: #111;
    color: white;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    border-top: 3px solid #7b8cce;
    transition: border-color 4s ease;
}

/* 顶部 */
.header {
    padding: 15px 20px 8px;
    font-size: 18px;
    opacity: 0.9;
}

.mood-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid #7b8cce;
    border-radius: 10px;
    color: #7b8cce;
    margin-bottom: 4px;
    transition: color 3s ease, border-color 3s ease;
}

.speaking {
    color: #00ff99;
    font-size: 12px;
}

/* 波形 */
.wave {
    height: 50px;
    min-height: 50px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
    padding: 5px 10px;
}

.bar {
    width: 3px;
    background: white;
    border-radius: 2px;
    animation: bounce 1s infinite ease-in-out;
    animation-play-state: paused;
}

@keyframes bounce {
    0%, 100% { height: 10px; }
    50% { height: 50px; }
}

/* 歌曲信息区 */
.now-playing {
    padding: 4px 20px;
    font-size: 13px;
    color: #00ff99;
    opacity: 0.85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* 下半部分 */
.content {
    background: #eee;
    color: black;
    padding: 12px 20px 15px;
    border-radius: 20px 20px 0 0;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 2px;
}

.subtitle {
    font-size: 13px;
    color: gray;
    margin-bottom: 8px;
}

/* 字幕区（旁白文本） */
.text-box {
    background: #ddd;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    min-height: 36px;
    transition: opacity 0.3s;
}

/* 进度条 */
.progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 4px;
}

.progress-row span {
    font-size: 11px;
    color: #888;
    min-width: 32px;
    text-align: center;
}

.progress-row input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: #ccc;
    outline: none;
    cursor: pointer;
}

.progress-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #111;
    cursor: pointer;
    transition: transform 0.1s;
}

.progress-row input[type="range"]::-webkit-slider-thumb:active {
    transform: scale(1.3);
}

/* ─── 歌词区 — Apple Music 风格 ─── */
.lyrics-header {
    font-size: 10px;
    color: #bbb;
    margin: 10px 0 0;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
}

.lyrics-box {
    position: relative;
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
    text-align: center;
    padding: 0 6px;
    margin: 4px 0;
    min-height: 200px;
    max-height: 280px;
    -webkit-mask-image: linear-gradient(to bottom,
        transparent 0%, black 12%, black 88%, transparent 100%);
    mask-image: linear-gradient(to bottom,
        transparent 0%, black 12%, black 88%, transparent 100%);
}

.lyrics-box::-webkit-scrollbar { width: 0; }

.lyrics-box p {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 15px;
    color: #c0c0c0;
    font-weight: 400;
    line-height: 2.6;
    margin: 0;
    padding: 3px 18px;
    transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    letter-spacing: 0.03em;
}

.lyrics-box p.active-lyric {
    font-size: 19px;
    color: #1a1a1a;
    font-weight: 600;
    letter-spacing: 0.01em;
}

/* 当前行后面紧跟着的那行 —— 微微亮起，制造过渡 */
.lyrics-box p.active-lyric + p {
    color: #a0a0a0;
}

/* 控制条 */
.controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 10px;
    margin-bottom: 6px;
}

.ctrl-btn {
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    background: #333;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.ctrl-btn:active {
    transform: scale(0.9);
    background: #555;
}

.play-btn {
    width: 44px;
    height: 44px;
    background: black;
    font-size: 18px;
}

#time {
    font-size: 13px;
    color: #666;
    min-width: 36px;
    text-align: center;
}

/* 歌单列表 */
.playlist-header {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.playlist-scroll {
    max-height: 100px;
    overflow-y: auto;
    border-radius: 8px;
    background: #ddd;
    padding: 4px 0;
}

#playlist {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 12px;
}

#playlist li {
    padding: 5px 12px;
    cursor: default;
    color: #333;
    border-left: 3px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.2s, border-color 0.2s;
}

#playlist li.active {
    background: #fff;
    border-left-color: #00cc66;
    color: #111;
    font-weight: bold;
}

#playlist li .pl-artist {
    color: #999;
    font-weight: normal;
}

.playlist-scroll::-webkit-scrollbar {
    width: 4px;
}
.playlist-scroll::-webkit-scrollbar-thumb {
    background: #bbb;
    border-radius: 2px;
}
</style>
</head>

<body>

<div class="card">

    <div class="header">
        Claudio
        <span class="mood-badge" id="moodBadge">🌙 深夜·呼吸</span>
        <span class="speaking" id="status">● Ready</span>
        <span class="speaking" id="voiceName" style="display:block;font-size:10px;opacity:0.6;margin-top:2px;"></span>
    </div>

    <div class="now-playing">
        🎵 <span id="songTitle">—</span>
        <span style="color:#aaa;" id="songArtist"></span>
    </div>

    <div class="wave" id="wave"></div>

    <div class="content">
        <div class="title">🌙 深夜·呼吸</div>
        <div class="subtitle">Claudio 为你守候</div>

        <div class="text-box">点击播放，Claudio 将为你带来一段深夜陪伴。</div>

        <!-- 进度条 -->
        <div class="progress-row">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressBar" min="0" max="1000" value="0"
                   oninput="onProgressInput(event)" onchange="onProgressChange(event)">
            <span id="totalTime">0:00</span>
        </div>

        <!-- 歌词 -->
        <div class="lyrics-header">歌词</div>
        <div class="lyrics-box" id="lyricsBox"></div>

        <div class="controls">
            <button class="ctrl-btn" onclick="skipToPrev()" title="上一首">⏮</button>
            <button id="playBtn" class="ctrl-btn play-btn" onclick="toggleAudio()">▶</button>
            <button class="ctrl-btn" onclick="skipToNext()" title="下一首">⏭</button>
            <span id="time">0:00</span>
        </div>

        <div class="playlist-header">歌单</div>
        <div class="playlist-scroll">
            <ul id="playlist"><li>加载中...</li></ul>
        </div>
    </div>

</div>

<script src="core/mood.js" defer></script>
<script src="core/data.js" defer></script>
<script src="ui.js" defer></script>
<script src="audio/tts.js" defer></script>
<script src="playlist.js" defer></script>
<script src="audio/player.js" defer></script>
<script src="audio/narration.js" defer></script>
<script src="core/radio.js" defer></script>

</body>
</html>
